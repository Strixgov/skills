<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" role="img" aria-label="@strixgov/verifier — Independent verification of Strix evidence">
  <defs>
    <pattern id="vf-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(255,255,255,0.025)"/>
    </pattern>
    <linearGradient id="vf-fade" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#D29922" stop-opacity="0"/>
      <stop offset="1" stop-color="#D29922" stop-opacity="0.18"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="300" fill="#060B18"/>
  <rect width="1200" height="300" fill="url(#vf-grid)"/>
  <rect x="780" y="0" width="420" height="300" fill="url(#vf-fade)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" fill="none" stroke="rgba(255,255,255,0.08)"/>

  <g font-family="'JetBrains Mono','SF Mono',Menlo,Consolas,monospace" fill="#F0F4F8">
    <text x="56" y="78" font-size="14" fill="#7D8590" letter-spacing="2">npx @strixgov/verifier &lt;artifact&gt;</text>
    <text x="56" y="140" font-size="44" font-weight="600">@strixgov/verifier</text>
    <text x="56" y="184" font-size="20" fill="#B4C0CC">Independent verification. Offline-capable.</text>
    <text x="56" y="212" font-size="20" fill="#B4C0CC">No Strix tooling required.</text>
    <g transform="translate(56,240)" font-size="12" fill="#7D8590">
      <rect x="0" y="0" width="86" height="26" rx="13" fill="none" stroke="rgba(210,153,34,0.4)"/>
      <text x="43" y="17" text-anchor="middle" fill="#D29922">v1.9.0</text>
      <text x="100" y="17">MIT · Velaris Group</text>
    </g>
  </g>

  <!-- Glyph: seal + check -->
  <g transform="translate(900,150)" fill="none">
    <!-- starburst seal -->
    <g stroke="#D29922" stroke-opacity="0.55" stroke-width="1.5">
      <circle r="92"/>
      <g>
        <line x1="0" y1="-92" x2="0" y2="-72"/>
        <line x1="65" y1="-65" x2="51" y2="-51"/>
        <line x1="92" y1="0" x2="72" y2="0"/>
        <line x1="65" y1="65" x2="51" y2="51"/>
        <line x1="0" y1="92" x2="0" y2="72"/>
        <line x1="-65" y1="65" x2="-51" y2="51"/>
        <line x1="-92" y1="0" x2="-72" y2="0"/>
        <line x1="-65" y1="-65" x2="-51" y2="-51"/>
      </g>
    </g>
    <circle r="58" stroke="#D29922" stroke-width="2"/>
    <!-- check -->
    <path d="M-22 2 L-6 18 L26 -16" stroke="#D29922" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text y="-104" text-anchor="middle" font-family="'JetBrains Mono',monospace" font-size="11" fill="#D29922" stroke="none">VERIFIED</text>
  </g>
</svg>
